global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by:
    - alertname
    - instance
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - receiver: telegram
      matchers:
        - severity="critical"
      repeat_interval: 30m

receivers:
  - name: telegram
    webhook_configs:
      - url: http://telegram-bot:5001/alert
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance
