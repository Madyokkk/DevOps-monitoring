global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          instance: linux-host

  - job_name: api
    metrics_path: /health
    static_configs:
      - targets:
          - api:3001

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
