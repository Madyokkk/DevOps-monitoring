<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доступ заблокирован</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { color: #ef4444; font-size: 1.4rem; margin-bottom: 0.75rem; }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.3rem 0.75rem;
      background: #0f172a;
      border-radius: 6px;
      font-family: monospace;
      color: #ef4444;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>IP-адрес заблокирован</h1>
    <p>Ваш IP-адрес временно заблокирован из&#8209;за слишком большого количества неудачных попыток входа.</p>
    <div class="badge">403 Forbidden</div>
  </div>
</body>
</html>
