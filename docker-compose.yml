services:
  app:
    build:
      context: ./app/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: rk-app
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      SERVER_API_URL: ${SERVER_API_URL:-http://api:3001}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: rk-api
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      n8n:
        condition: service_started
    expose:
      - "3001"
    command: >
      sh -c "npx prisma migrate deploy &&
      if [ \"$${RUN_SEED:-false}\" = \"true\" ]; then npm run db:seed; fi &&
      node dist/src/main.js"
    networks:
      - backend
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    build:
      context: ./docker/nginx
    container_name: rk-nginx
    restart: always
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
      api:
        condition: service_healthy
      grafana:
        condition: service_started
      n8n:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/banned.conf:/etc/nginx/conf.d/banned.conf
      - ./nginx/error_pages:/etc/nginx/error_pages:ro
      - ./logs/nginx:/var/log/nginx
      - nginx_ssl:/etc/nginx/ssl
    networks:
      - frontend
      - backend
      - monitoring

  db:
    image: postgres:16-alpine
    container_name: rk-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Almaty}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rk-prometheus
    restart: always
    env_file:
      - .env
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      alertmanager:
        condition: service_started
      node-exporter:
        condition: service_started
    networks:
      - frontend
      - backend
      - monitoring

  grafana:
    image: grafana/grafana:11.4.0
    container_name: rk-grafana
    restart: always
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - monitoring

  n8n:
    image: n8nio/n8n:1.74.3
    container_name: rk-n8n
    restart: always
    env_file:
      - .env
    environment:
      N8N_HOST: ${DOMAIN_NAME:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: https://${DOMAIN_NAME:-localhost}/n8n/
      WEBHOOK_URL: http://n8n:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: ${TZ:-Asia/Almaty}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./site/docker/n8n/rk-assistant-workflow.json:/workflows/rk-assistant-workflow.json:ro
    networks:
      - backend
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: rk-node-exporter
    restart: always
    env_file:
      - .env
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: rk-postgres-exporter
    restart: always
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rk-alertmanager
    restart: always
    env_file:
      - .env
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring

  telegram-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: rk-telegram-bot
    restart: always
    env_file:
      - .env
    environment:
      PROMETHEUS_URL: http://prometheus:9090
    expose:
      - "5001"
    ports:
      - "${BOT_PORT:-5001}:5001"
    volumes:
      - /home/ubuntu/project-root/run:/run/fail2ban
    networks:
      - frontend
      - backend
      - monitoring

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  nginx_ssl:
  n8n_data:
